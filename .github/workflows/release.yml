name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release and Upload Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross compiler for Linux targets
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build binary
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
            cargo build --release --target x86_64-unknown-linux-gnu
            cp target/x86_64-unknown-linux-gnu/release/channels-red ./agent-greenroom
          elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cargo build --release --target aarch64-unknown-linux-gnu
            cp target/aarch64-unknown-linux-gnu/release/channels-red ./agent-greenroom
          else
            # For macOS targets we cross-compile from Linux
            rustup target add ${{ matrix.target }}
            cargo build --release --target ${{ matrix.target }}
            cp target/${{ matrix.target }}/release/channels-red ./agent-greenroom
          fi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Make binary executable
        run: chmod +x ./agent-greenroom

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./agent-greenroom
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          # The binary will be renamed per target by the action
          asset_name: agent-greenroom-${{ matrix.target }}
