name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    name: Build and Upload Binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build binary
        run: cargo zigbuild --target ${{ matrix.target }} --release

      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/agent-greenroom ./agent-greenroom-${{ matrix.target }}
          chmod +x ./agent-greenroom-${{ matrix.target }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./agent-greenroom-${{ matrix.target }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          fail_on_unmatched_files: true

  skills:
    name: Upload Skill Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload skills to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skills/agent-greenroom.md
            skills/agent-greenroom-opencode.md
            skills/agent-greenroom-codex.md
          name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          fail_on_unmatched_files: true
